<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letters While I'm Away ❤️</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
            background: #fff5f7;
            color: #333;
        }

        h1 {
            text-align: center;
        }

        .letter {
            background: white;
            padding: 20px;
            margin: 15px 0;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .locked {
            color: #888;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>❤️ Letters While I'm Away ❤️</h1>

    <div id="letters"></div>

    <script>

        // CHANGE THIS TO THE DATE YOU WANT DAY 1 TO UNLOCK
        const startDate = new Date("2026-07-01");

        const letters = [
            "Hey babe! Day one so I doubt I'll even be there yet. I'm currently sat on my sofa you're at the pub and I miss you now. I probably will be missing you while you're reading this so I can't imagine how much I'll miss you by the end of this. I hope you know I'm thinking of you. Good morning, Goodnight, I love you ",
            "",
            "Day 3",
            "Day 4",
            "Day 5",
            "Day 6",
            "Day 7",
            "Day 8",
            "Day 9",
            "Day 10",
            "Day 11",
            "Day 12",
            "Day 13",
            "Day 14",
            "Day 15",
            "Day 16",
            "Day 17",
            "Day 18",
            "Day 19",
            "Day 20"
        ];

        const today = new Date();

        const daysPassed = Math.floor(
            (today - startDate) / (1000 * 60 * 60 * 24)
        );

        const container = document.getElementById("letters");

        letters.forEach((letter, index) => {

            const div = document.createElement("div");
            div.classList.add("letter");

            if (index <= daysPassed) {
                div.innerHTML = `<h2>${letter}</h2>`;
            } else {
                div.innerHTML = `<div class="locked">🔒 ${letter} Locked</div>`;
            }

            container.appendChild(div);
        });

    </script>

</body>
</html>
